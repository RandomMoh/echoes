name: echoes
description: "A new Flutter project."
publish_to: 'none'
version: 1.4.5+1

environment:
  sdk: ^3.12.2

dependencies:
  flame: ^1.37.0
  flame_audio: ^2.12.1
  flutter:
    sdk: flutter
  flutter_animate: ^4.5.2
  google_fonts: ^8.2.0
  package_info_plus: ^10.2.1
  shared_preferences: ^2.5.5
  wakelock_plus: ^1.6.1

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^6.0.0
  flutter_launcher_icons: ^0.14.4

flutter:
  uses-material-design: true
  assets:
    - assets/audio/
  fonts:
    - family: PressStart2P
      fonts:
        - asset: assets/fonts/PressStart2P-Regular.ttf

flutter_launcher_icons:
  android: "launcher_icon"
  ios: true
  image_path: "assets/icon/icon.png"
  min_sdk_android: 21
